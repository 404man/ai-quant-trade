services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "18002:18002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:18002
    depends_on:
      - api
    restart: unless-stopped
